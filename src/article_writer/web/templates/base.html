<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}AI Trends Scout{% endblock %}</title>
    <style>
      :root {
        --bg: #f5f2ea;
        --panel: rgba(255, 255, 255, 0.88);
        --panel-strong: #ffffff;
        --line: rgba(32, 44, 57, 0.12);
        --ink: #18212a;
        --muted: #5d6772;
        --accent: #0d9488;
        --accent-2: #e67e22;
        --danger: #b42318;
        --shadow: 0 18px 40px rgba(20, 28, 36, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(13, 148, 136, 0.18), transparent 30%),
          radial-gradient(circle at top right, rgba(230, 126, 34, 0.12), transparent 24%),
          linear-gradient(180deg, #f8f5ef 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 48px;
      }

      .masthead {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 24px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .brand {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .eyebrow {
        font-size: 12px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .title {
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1;
        margin: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        max-width: 52ch;
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .nav a {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(24, 33, 42, 0.04);
        border: 1px solid transparent;
        font-size: 14px;
      }

      .nav a:hover {
        border-color: var(--line);
        background: rgba(13, 148, 136, 0.08);
      }

      .content {
        margin-top: 24px;
      }

      .banner {
        margin-bottom: 18px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(13, 148, 136, 0.1);
        border: 1px solid rgba(13, 148, 136, 0.18);
        color: #0f5d58;
      }

      .kpis,
      .grid {
        display: grid;
        gap: 16px;
      }

      .kpis {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        margin-bottom: 22px;
      }

      .grid.two {
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      }

      .card {
        background: var(--panel-strong);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 20px;
        box-shadow: var(--shadow);
      }

      .card h2,
      .card h3 {
        margin-top: 0;
      }

      .kpi-label {
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .kpi-value {
        font-size: 34px;
        margin-top: 8px;
      }

      .muted {
        color: var(--muted);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 13px;
        background: rgba(24, 33, 42, 0.05);
      }

      .status.running {
        background: rgba(230, 126, 34, 0.15);
        color: #9d5a18;
      }

      .status.completed {
        background: rgba(13, 148, 136, 0.14);
        color: #0f5d58;
      }

      .status.failed {
        background: rgba(180, 35, 24, 0.12);
        color: var(--danger);
      }

      .button,
      button {
        border: 0;
        cursor: pointer;
        border-radius: 999px;
        padding: 11px 16px;
        background: linear-gradient(135deg, var(--accent), #0f766e);
        color: white;
        font: inherit;
      }

      .button.secondary {
        background: linear-gradient(135deg, var(--accent-2), #c56a14);
      }

      .button.ghost {
        background: rgba(24, 33, 42, 0.06);
        color: var(--ink);
        border: 1px solid var(--line);
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        font: inherit;
        color: var(--ink);
      }

      label {
        display: grid;
        gap: 8px;
        font-size: 14px;
      }

      form.stack {
        display: grid;
        gap: 16px;
      }

      .list {
        display: grid;
        gap: 14px;
      }

      .item {
        padding: 16px;
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.84);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .item h3 {
        margin: 0 0 8px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 10px;
      }

      ul.clean {
        margin: 0;
        padding-left: 18px;
      }

      pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "Courier New", monospace;
        background: #fbfbfa;
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 16px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 10px;
        text-align: left;
        border-bottom: 1px solid var(--line);
        vertical-align: top;
      }

      .empty {
        padding: 36px;
        text-align: center;
        border: 1px dashed var(--line);
        border-radius: 22px;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.55);
      }

      @media (max-width: 720px) {
        .masthead {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="masthead">
        <div class="brand">
          <span class="eyebrow">Local AI Scout</span>
          <h1 class="title">AI Trends Dashboard</h1>
          <p class="subtitle">A localhost site that finds fresh AI trends, ranks them, and lets you create articles on demand.</p>
        </div>
        <nav class="nav">
          <a href="/">Dashboard</a>
          <a href="/trends">Trends</a>
          <a href="/articles">Articles</a>
          <a href="/history">History</a>
        </nav>
      </header>

      <main class="content">
        {% if message %}
        <div class="banner">{{ message.replace('-', ' ').title() }}</div>
        {% endif %}
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
